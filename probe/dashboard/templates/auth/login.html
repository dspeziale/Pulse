{% extends "base.html" %}
{% block title %}Accesso — Pulse Sonda{% endblock %}
{% block content %}
<div class="login-box">
  <div class="login-logo">Pulse <span class="accent">— Sonda</span></div>
  <div class="card">
    <div class="card-body">
      <p class="text-body-secondary text-center">Accesso operatore locale.</p>
      <form method="post" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-1"></i>Accedi</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
