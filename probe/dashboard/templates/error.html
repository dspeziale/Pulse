{% extends "base.html" %}
{% block title %}Errore {{ code }} — Pulse Sonda{% endblock %}
{% block content %}
<div class="card">
  <div class="card-body text-center py-5">
    <i class="bi bi-exclamation-octagon text-danger" style="font-size:3rem"></i>
    <h1 class="h3 mt-3 text-danger">Errore {{ code }}</h1>
    <p class="fs-5 text-body-secondary">{{ message }}</p>
    <a class="btn btn-secondary mt-2" href="{{ url_for('dashboard.index') }}"><i class="bi bi-arrow-left me-1"></i>Torna alla dashboard</a>
  </div>
</div>
{% endblock %}
