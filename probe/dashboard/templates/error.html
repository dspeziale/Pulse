{% extends "base.html" %}
{% block title %}Errore {{ code }} — Pulse Sonda{% endblock %}
{% block content %}
<div class="card">
  <h1 class="text-danger"><i class="bi bi-exclamation-octagon"></i> Errore {{ code }}</h1>

</div>
{% endblock %}
