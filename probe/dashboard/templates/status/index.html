{% extends "base.html" %}
{% block title %}Stato Probe — Pulse{% endblock %}
{% block content %}
<h1>Stato Probe / Salute (PP-05)</h1>

<div class="card">
  <h2>Readiness</h2>
  <p>Stato: <span class="badge {{ 'b-ok' if ready.status in ('ready','ok') else 'b-error' }}">{{ ready.status }}</span></p>
  <pre class="muted">{{ ready|tojson(indent=2) }}</pre>
</div>

<div class="card">
  <h2>Stato interno</h2>
  <pre class="muted">{{ status|tojson(indent=2) }}</pre>
</div>
{% endblock %}
