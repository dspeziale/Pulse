# =============================================================================
# Pulse — Stack PROBE (Podman Compose)
# File: deploy/podman-compose.probe.yml
#
# Struttura IDENTICA al docker-compose corrispondente. Avvio:
#   podman-compose -f deploy/podman-compose.probe.yml --env-file deploy/.env.probe up -d --build
#
# DIFFERENZE Podman (documentate):
#  - Podman NON e' installato in questo ambiente: file prodotto ma validato
#    solo indirettamente (schema identico al docker-compose gia' validato).
#  - podman-compose potrebbe ignorare `depends_on.condition: service_healthy`
#    (dipende dalla versione): in tal caso attendere manualmente che
#    postgres/opensearch siano 'healthy' prima di avviare backend/agent.
#  - Con Podman rootless le porte <1024 richiedono privilegi: usare le porte
#    di default (>1024) qui configurate.
#  - Il campo top-level `name:` e' supportato da podman-compose recenti; se la
#    versione lo rifiuta, rimuoverlo (i nomi di rete/volume restano espliciti).
# =============================================================================

name: pulse-probe

services:
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: pulse-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      # Ambiente di sviluppo: sicurezza demo disabilitata (abilitarla in produzione).
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD:-Pulse_OS_Admin1!}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - pulse_osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [pulse]

  probe-agent:
    build:
      context: ..
      dockerfile: probe/agent/Dockerfile
    image: pulse-probe-agent:latest
    container_name: pulse-probe-agent
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      PULSE_PROBE_API_PORT: ${PULSE_PROBE_API_PORT:-8444}
      PULSE_PROBE_SERVER_BASE_URL: ${PULSE_PROBE_SERVER_BASE_URL:-https://server-backend:9443}
      PULSE_PROBE_ENROLLMENT_TOKEN: ${PULSE_PROBE_ENROLLMENT_TOKEN:-}
      PULSE_PROBE_PROBE_TOKEN: ${PULSE_PROBE_PROBE_TOKEN:-}
      PULSE_PROBE_SERVER_QUERY_TOKEN: ${PULSE_PROBE_SERVER_QUERY_TOKEN:-server-to-probe-token}
      PULSE_PROBE_OPENSEARCH_URL: http://opensearch:9200
      PULSE_PROBE_HTTP_VERIFY: ${PULSE_PROBE_HTTP_VERIFY:-false}
      PULSE_PROBE_LOG_LEVEL: ${PULSE_PROBE_LOG_LEVEL:-info}
    ports:
      - "${PULSE_PROBE_API_PORT:-8444}:${PULSE_PROBE_API_PORT:-8444}"
    networks: [pulse]

  probe-dashboard:
    build:
      context: ..
      dockerfile: probe/dashboard/Dockerfile
    image: pulse-probe-dashboard:latest
    container_name: pulse-probe-dashboard
    restart: unless-stopped
    depends_on:
      - probe-agent
    environment:
      PULSE_PROBE_DASH_PORT: ${PULSE_PROBE_DASH_PORT:-5001}
      PULSE_PROBE_API_BASE: http://probe-agent:${PULSE_PROBE_API_PORT:-8444}/api/v1
      PULSE_PROBE_AGENT_TOKEN: ${PULSE_PROBE_SERVER_QUERY_TOKEN:-server-to-probe-token}
      PULSE_PROBE_DASH_USER: ${PULSE_PROBE_DASH_USER:-probe}
      PULSE_PROBE_DASH_PASSWORD: ${PULSE_PROBE_DASH_PASSWORD:-probe}
      PULSE_PROBE_SECRET_KEY: ${PULSE_PROBE_SECRET_KEY:-dev-probe-secret}
      PULSE_HTTP_TIMEOUT: ${PULSE_HTTP_TIMEOUT:-10}
      PULSE_VERIFY_TLS: ${PULSE_VERIFY_TLS:-false}
    ports:
      - "${PULSE_PROBE_DASH_PORT:-5001}:${PULSE_PROBE_DASH_PORT:-5001}"
    networks: [pulse]

volumes:
  pulse_osdata:
    name: pulse_osdata

networks:
  pulse:
    name: pulse-probe-net
