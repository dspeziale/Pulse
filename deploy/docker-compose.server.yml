# =============================================================================
# Pulse — Stack SERVER (Docker Compose)
# File: deploy/docker-compose.server.yml
#
# Servizi:
#   - postgres        : DB Server (schema.sql + seed.sql del DBA, init automatico)
#   - server-backend  : API FastAPI (AGENTE 3 — BE)
#   - server-dashboard: dashboard Flask (AGENTE 4 — FE), build context = radice repo
#
# Avvio (dalla RADICE del repository):
#   docker compose -f deploy/docker-compose.server.yml --env-file deploy/.env.server up -d --build
# Stop:
#   docker compose -f deploy/docker-compose.server.yml down
#
# NB: i build context sono relativi alla RADICE del repository (vedi `context:`).
# =============================================================================

name: pulse-server

services:
  postgres:
    image: postgres:16
    container_name: pulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulse}
      POSTGRES_DB: ${POSTGRES_DB:-pulse}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      TZ: UTC
    volumes:
      - pulse_pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulse} -d ${POSTGRES_DB:-pulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [pulse]

  server-backend:
    build:
      context: ../server/backend
      dockerfile: Dockerfile
    image: pulse-server-backend:latest
    container_name: pulse-server-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PULSE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD:-pulse}@postgres:5432/${POSTGRES_DB:-pulse}
      PULSE_API_PORT: ${PULSE_API_PORT:-8443}
      PULSE_JWT_SECRET: ${PULSE_JWT_SECRET:-change-me-in-production}
      PULSE_SECRETS_ENCRYPTION_KEY: ${PULSE_SECRETS_ENCRYPTION_KEY:-}
      PULSE_PROBE_QUERY_TOKEN: ${PULSE_PROBE_QUERY_TOKEN:-server-to-probe-token}
      PULSE_WORKERS: ${PULSE_WORKERS:-2}
      PULSE_LOG_LEVEL: ${PULSE_LOG_LEVEL:-info}
    ports:
      - "${PULSE_API_PORT:-8443}:${PULSE_API_PORT:-8443}"
    networks: [pulse, shared]

  server-dashboard:
    build:
      context: ..
      dockerfile: server/dashboard/Dockerfile
    image: pulse-server-dashboard:latest
    container_name: pulse-server-dashboard
    restart: unless-stopped
    depends_on:
      - server-backend
    environment:
      PULSE_SERVER_DASH_PORT: ${PULSE_SERVER_DASH_PORT:-5000}
      PULSE_SERVER_API_BASE: http://server-backend:${PULSE_API_PORT:-8443}/api/v1
      PULSE_SERVER_SECRET_KEY: ${PULSE_SERVER_SECRET_KEY:-dev-server-secret}
      PULSE_HTTP_TIMEOUT: ${PULSE_HTTP_TIMEOUT:-10}
      PULSE_VERIFY_TLS: ${PULSE_VERIFY_TLS:-false}
    ports:
      - "${PULSE_SERVER_DASH_PORT:-5000}:${PULSE_SERVER_DASH_PORT:-5000}"
    networks: [pulse]

volumes:
  pulse_pgdata:
    name: pulse_pgdata

networks:
  pulse:
    name: pulse-server-net
  # Rete condivisa Server<->Sonda per enrollment e query drill-down (creata esternamente:
  #   docker network create pulse-shared)
  shared:
    name: pulse-shared
    external: true
